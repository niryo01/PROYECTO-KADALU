<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel de control</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="controllers/adminController.js" defer></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="section">
      <div class="container">
        <div class="level dashboard-header mb-6">
          <div class="level-left">
            <div class="level-item">
              <h1 class="title is-3 has-text-white has-text-weight-bold mb-0">
                Panel de Control
              </h1>
              <button
                class="button is-danger is-outlined pl-3 ml-5"
                id="btn-logout"
              >
                Cerrar Sesion
              </button>
            </div>
          </div>
          <div class="level-right">
            <div class="level-item buttons">
              <button id="btn-open-add" class="button is-kadalu-btn">
                Nuevo Producto
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="container">
        <div class="table-container"></div>
      </div>
    </main>

    <div class="modal" id="modal-add-product">
      <div class="modal-background"></div>
      <div class="modal-card kadalu-modal">
        <header class="modal-card-head">
          <p class="modal-card-title has-text-white has-text-weight-bold">
            Registrar Nuevo Producto
          </p>
          <button class="delete" aria-label="close" id="btn-close-add"></button>
        </header>

        <section class="modal-card-body">
          <form id="form-add">
            <div class="field">
              <label class="label is-kadalu has-text-white-bis"
                >Imagen del Producto</label
              >
              <div class="control">
                <input
                  class="input is-kadalu kadalu-file"
                  type="file"
                  accept="image/*"
                  id="añadir-imagen-producto"
                />
              </div>
            </div>

            <div class="field">
              <label class="label is-kadalu has-text-white-bis"
                >Nombre del Producto</label
              >
              <div class="control">
                <input
                  class="input is-kadalu"
                  type="text"
                  placeholder="Ej. Polo Oversize Negro"
                  id="añadir-nombre-producto"
                />
              </div>
            </div>

            <div class="columns is-mobile mb-0">
              <div class="column">
                <div class="field">
                  <label class="label is-kadalu has-text-white-bis"
                    >Precio (S/)</label
                  >
                  <div class="control">
                    <input
                      class="input is-kadalu"
                      type="number"
                      step="0.01"
                      placeholder="0.00"
                      id="añadir-precio-producto"
                    />
                  </div>
                </div>
              </div>
              <div class="column">
                <div class="field">
                  <label class="label is-kadalu has-text-white-bis"
                    >Stock</label
                  >
                  <div class="control">
                    <input
                      class="input is-kadalu"
                      type="number"
                      placeholder="0"
                      id="añadir-stock-producto"
                    />
                  </div>
                </div>
              </div>
            </div>

            <div class="field">
              <label class="label is-kadalu has-text-white-bis"
                >Categoría del producto</label
              >
              <div class="control">
                <div class="select is-fullwidth is-kadalu-select">
                  <select id="añadir-categoria-producto">
                    <option value="">Selecciona una categoría...</option>
                  </select>
                </div>
              </div>
            </div>

            <div class="field">
              <label class="label is-kadalu has-text-white-bis"
                >Genero del producto</label
              >
              <div class="control">
                <div class="select is-fullwidth is-kadalu-select">
                  <select disabled id="añadir-genero-producto">
                    <option value="">
                      Selecciona el genero de la categoria
                    </option>
                  </select>
                </div>
              </div>
            </div>

            <div class="field">
              <label class="label is-kadalu has-text-white-bis"
                >Tipo de Producto</label
              >
              <div class="control">
                <div class="select is-fullwidth is-kadalu-select">
                  <select disabled id="añadir-tipo-producto">
                    <option value="">Selecciona el tipo de producto</option>
                  </select>
                </div>
              </div>
            </div>
          </form>
        </section>

        <footer class="modal-card-foot is-justify-content-flex-end">
          <button
            class="button is-ghost has-text-grey-light"
            id="btn-cancel-add"
          >
            Cancelar
          </button>
          <button class="button is-kadalu-btn" type="submit" form="form-add">
            Guardar Producto
          </button>
        </footer>
      </div>
    </div>

    <div class="modal" id="modal-edit-product">
      <div class="modal-background"></div>
      <div class="modal-card kadalu-modal">
        <header class="modal-card-head">
          <p class="modal-card-title has-text-white has-text-weight-bold">
            Editar
          </p>
          <button
            class="delete"
            aria-label="close"
            id="btn-close-edit"
          ></button>
        </header>

        <section class="modal-card-body">
          <form id="form-edit">
            <div class="field">
              <label class="label is-kadalu">Actualizar Imagen</label>
              <div class="control">
                <input
                  class="input is-kadalu kadalu-file"
                  type="file"
                  accept="image/*"
                  id="editar-imagen-producto"
                />
              </div>
            </div>

            <div class="field">
              <label class="label is-kadalu">Nombre del Producto</label>
              <div class="control">
                <input
                  class="input is-kadalu"
                  type="text"
                  placeholder="Ej. Polo Oversize Negro"
                  id="editar-nombre-producto"
                />
              </div>
            </div>

            <div class="columns is-mobile mb-0">
              <div class="column">
                <div class="field">
                  <label class="label is-kadalu">Precio (S/)</label>
                  <div class="control">
                    <input
                      class="input is-kadalu"
                      type="number"
                      step="0.01"
                      placeholder="0.00"
                      id="editar-precio-producto"
                    />
                  </div>
                </div>
              </div>
              <div class="column">
                <div class="field">
                  <label class="label is-kadalu">Stock</label>
                  <div class="control">
                    <input
                      class="input is-kadalu"
                      type="number"
                      placeholder="0"
                      id="editar-stock-producto"
                    />
                  </div>
                </div>
              </div>
            </div>
          </form>
        </section>

        <footer class="modal-card-foot is-justify-content-flex-end">
          <button
            class="button is-ghost has-text-grey-light"
            id="btn-cancel-edit"
          >
            Cancelar
          </button>
          <button class="button is-kadalu-btn" type="submit" form="form-edit">
            Actualizar Cambios
          </button>
        </footer>
      </div>
    </div>
  </body>
</html>
