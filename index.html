<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kadalu Store</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <script
      type="module"
      src="controllers/catalogoController.js"
      defer
    ></script>
  </head>
  <body>
    <section class="kadalu-hero">
      <div class="hero-overlay"></div>
      <img
        src="imagenes/kadalu.jpg"
        alt="Kadalu Store Banner"
        class="hero-bg"
      />
      <div class="hero-content">
        <h1 class="title is-1 has-text-white has-text-weight-bold">
          Novedades de la Semana
        </h1>
        <p class="subtitle is-5 mt-3" style="color: var(--color-pink-logo)">
          Arma tu pedido y envíalo por WhatsApp
        </p>
      </div>
    </section>
    <div class="container mb-4 px-3">
      <button
        id="btn-abrir-filtros"
        class="button is-dark is-outlined is-rounded"
      >
        <span class="icon is-small"><i class="fas fa-sliders-h"></i></span>
        <span class="has-text-weight-semibold">Filtrar Catálogo</span>
      </button>
    </div>

    <main class="section">
      <div class="container">
        <div
          id="contenedor-productos"
          class="product-grid columns is-multiline is-mobile"
        ></div>
      </div>
    </main>

    <div id="proforma-bar" class="proforma-floating">
      <div class="proforma-content">
        <div class="proforma-info">
          <p class="is-size-7 has-text-grey-light mb-0">Total a pagar</p>
          <p class="is-size-4 has-text-weight-bold has-text-white mb-0">
            <span id="monto-total">S/ 0.00</span>
          </p>
        </div>
        <button
          id="btn-whatsapp"
          class="button is-kadalu is-rounded has-text-weight-bold shadow-pink"
        >
          <span>Pedir (S/ <span id="cantidad-items">0</span>)</span>
        </button>
      </div>
    </div>

    <div id="modal-filtros" class="modal modal-lateral">
      <div class="modal-background" id="bg-cerrar-filtros"></div>

      <div class="modal-card lateral-panel">
        <header
          class="modal-card-head is-radiusless has-background-white"
          style="border-bottom: 1px solid #eee"
        >
          <p class="modal-card-title has-text-weight-bold is-size-5">Filtros</p>
          <button
            id="btn-cerrar-filtros"
            class="delete is-medium"
            aria-label="close"
          ></button>
        </header>

        <section class="modal-card-body">
          <div class="field mb-5">
            <label class="label is-small has-text-grey"
              >CATEGORÍA PRINCIPAL</label
            >
            <div class="control">
              <div class="select is-fullwidth">
                <select id="filtro-categoria">
                  <option value="">Todas las categorías...</option>
                </select>
              </div>
            </div>
          </div>

          <div class="field mb-5">
            <label class="label is-small has-text-grey">GÉNERO</label>
            <div class="control">
              <div class="select is-fullwidth">
                <select id="filtro-genero" disabled>
                  <option value="">Selecciona un género...</option>
                </select>
              </div>
            </div>
          </div>

          <div class="field mb-5">
            <label class="label is-small has-text-grey">TIPO DE PRODUCTO</label>
            <div class="control">
              <div class="select is-fullwidth">
                <select id="filtro-tipo" disabled>
                  <option value="">Selecciona el tipo...</option>
                </select>
              </div>
            </div>
          </div>
        </section>

        <footer
          class="modal-card-foot is-radiusless has-background-white is-justify-content-space-between"
          style="border-top: 1px solid #eee"
        >
          <button
            id="btn-limpiar-filtros"
            class="button is-ghost has-text-grey"
          >
            Limpiar
          </button>
          <button
            id="btn-aplicar-filtros"
            class="button is-dark has-text-weight-bold is-rounded px-5"
          >
            Ver Resultados
          </button>
        </footer>
      </div>
    </div>
  </body>
</html>
