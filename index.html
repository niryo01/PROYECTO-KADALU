<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kadalu Store</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="script.js" defer></script>
  </head>
  <body>
    <section class="kadalu-banner">
      <img
        src="https://via.placeholder.com/1920x600/1e293b/ff66b2?text=KADALU+STORE+BANNER+(Carga+tu+imagen)"
        alt="Kadalu Store Banner"
        class="kadalu-banner-image"
      />
    </section>

    <main class="section">
      <div class="container">
        <div class="has-text-centered mb-5">
          <h1 class="title is-2" style="color: var(--color-white)">
            Novedades de la Semana
          </h1>
          <p class="subtitle is-5" style="color: var(--color-pink-logo)">
            Arma tu pedido y envíalo por WhatsApp
          </p>
        </div>

        <div
          id="contenedor-productos"
          class="product-grid columns is-multiline is-mobile"
        ></div>
      </div>
    </main>

    <div id="proforma-bar">
      <div class="container">
        <div class="level is-mobile">
          <div class="level-left">
            <div class="level-item">
              <p class="is-size-5 has-text-weight-bold">
                Total:
                <span id="monto-total" class="has-text-weight-extrabold"
                  >S/ 0.00</span
                >
              </p>
            </div>
          </div>
          <div class="level-right">
            <div class="level-item">
              <button id="btn-whatsapp" class="button is-success is-kadalu">
                Pedir por WhatsApp (S/ <span id="cantidad-items">0</span>)
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
