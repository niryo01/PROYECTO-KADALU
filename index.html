<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kadalu Store</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <script
      type="module"
      src="controllers/catalogoController.js"
      defer
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>
  <body>
    <section class="kadalu-hero">
      <div class="hero-overlay"></div>
      <img
        src="imagenes/kadalu.jpg"
        alt="Kadalu Store Banner"
        class="hero-bg"
      />
      <div class="hero-content">
        <h1 class="title is-1 has-text-white has-text-weight-bold">
          CATALOGO VIRTUAL
        </h1>
        <p class="subtitle is-5 mt-3" style="color: var(--color-pink-logo)">
          Arma tu pedido y comunicate por WhatsApp para finalizar tu compra
        </p>
      </div>
    </section>

    <main class="section pt-0" id="section-catalogo">
      <div class="container">
        <div class="container mt-5 px-3 is-hidden contenedor-btn-filtros">
          <button
            id="btn-abrir-filtros"
            class="button is-white is-outlined is-rounded"
          >
            <span class="has-text-weight-semibold">Filtrar Catálogo</span>
          </button>
        </div>

        <!-- PANTALLA DE CARGA (Visible por defecto) -->
        <div id="pantalla-carga" class="container mt-6 has-text-centered">
          <!-- Bulma tiene una clase 'loader', le damos tamaño con algo de estilo en línea o clases -->
          <div
            class="loader is-inline-block"
            style="
              width: 3rem;
              height: 3rem;
              border-width: 0.25rem;
              border-bottom-color: var(--color-pink-logo);
            "
          ></div>
          <p class="mt-3 has-text-grey has-text-weight-semibold is-size-5">
            Cargando el catálogo...
          </p>
        </div>
        <div
          id="contenedor-productos"
          class="product-grid columns is-multiline is-mobile"
        ></div>
      </div>
    </main>

    <div id="modal-filtros" class="modal modal-lateral">
      <div class="modal-background" id="bg-cerrar-filtros"></div>

      <div class="modal-card lateral-panel">
        <header
          class="modal-card-head is-radiusless has-background-white"
          style="border-bottom: 1px solid #eee"
        >
          <p class="modal-card-title has-text-weight-bold is-size-5">Filtros</p>
          <button
            id="btn-cerrar-filtros"
            class="delete is-medium"
            aria-label="close"
          ></button>
        </header>

        <section class="modal-card-body">
          <div class="field mb-5">
            <label class="label is-small has-text-grey"
              >CATEGORÍA PRINCIPAL</label
            >
            <div class="control">
              <div class="select is-fullwidth">
                <select id="filtro-categoria">
                  <option value="">Todas las categorías...</option>
                </select>
              </div>
            </div>
          </div>

          <div class="field mb-5">
            <label class="label is-small has-text-grey">GÉNERO</label>
            <div class="control">
              <div class="select is-fullwidth">
                <select id="filtro-genero" disabled>
                  <option value="">Selecciona un género...</option>
                </select>
              </div>
            </div>
          </div>

          <div class="field mb-5">
            <label class="label is-small has-text-grey">TIPO DE PRODUCTO</label>
            <div class="control">
              <div class="select is-fullwidth">
                <select id="filtro-tipo" disabled>
                  <option value="">Selecciona el tipo...</option>
                </select>
              </div>
            </div>
          </div>
        </section>

        <footer
          class="modal-card-foot is-radiusless has-background-white is-justify-content-space-between"
          style="border-top: 1px solid #eee"
        >
          <button
            id="btn-limpiar-filtros"
            class="button is-ghost has-text-grey"
          >
            Limpiar
          </button>
          <button
            id="btn-aplicar-filtros"
            class="button is-dark has-text-weight-bold is-rounded px-5"
          >
            Ver Resultados
          </button>
        </footer>
      </div>
    </div>

    <!-- MODAL DE DETALLE DE PRODUCTO -->
    <div id="modal-detalle-producto" class="modal">
      <!-- Fondo oscuro del modal -->
      <div class="modal-background" id="bg-cerrar-detalle"></div>

      <!-- Contenido del modal -->
      <div class="modal-content px-3"></div>

      <!-- Botón superior derecho para cerrar -->
      <button
        id="btn-cerrar-detalle-x"
        class="modal-close is-large"
        aria-label="close"
      ></button>
    </div>
  </body>
</html>
